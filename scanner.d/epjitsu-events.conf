/*
 * Fujitsu ScanSnap S1100 (epjitsu backend) event notifications
 * Paper loaded/unloaded, cover open, power save.
 * Matches epjitsu devices (S1100, S1300, etc.).
 */

device epjitsu {
        filter = "^epjitsu.*"
        desc   = "Fujitsu ScanSnap (epjitsu)"

        action paperload {
                filter = "^page-loaded.*"
                desc   = "Page loaded (triggers scan)"
                numerical-trigger {
                        from-value = 0
                        to-value   = 1
                }
                script = "/usr/local/bin/scan-button.sh"
        }

        action paperunload {
                filter = "^page-loaded.*"
                desc   = "Page unloaded"
                numerical-trigger {
                        from-value = 1
                        to-value   = 0
                }
                script = "/usr/local/bin/scan-events.sh"
        }

        action coveropen {
                filter = "^cover-open.*"
                desc   = "Cover opened"
                numerical-trigger {
                        from-value = 0
                        to-value   = 1
                }
                script = "/usr/local/bin/scan-events.sh"
        }

        action powersave {
                filter = "^power-save.*"
                desc   = "Power save"
                numerical-trigger {
                        from-value = 0
                        to-value   = 1
                }
                script = "/usr/local/bin/scan-events.sh"
        }
}
